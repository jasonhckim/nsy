      <rect x="84" y="54" width="592" height="492" fill="url(#glowBlue)"/>
      <path d="M88 404C184 338 259 335 351 390C450 449 523 451 676 342" stroke="#EEF4EC" stroke-opacity=".12" stroke-width="86"/>
