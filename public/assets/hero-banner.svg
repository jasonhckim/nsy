      <circle cx="382" cy="414" r="78" fill="#EEF4EC" fill-opacity=".05" stroke="#EEF4EC" stroke-opacity=".2"/>
      <circle cx="546" cy="354" r="58" fill="#69A8FF" fill-opacity=".12" stroke="#69A8FF" stroke-opacity=".58"/>
