      <path d="M204 199H286" stroke="#EEF4EC" stroke-opacity=".55" stroke-width="5" stroke-linecap="round"/>
      <path d="M426 238H544" stroke="#EEF4EC" stroke-opacity=".72" stroke-width="5" stroke-linecap="round"/>
